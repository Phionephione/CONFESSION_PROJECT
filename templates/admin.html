{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-10 glass-card">
        <h2 class="mb-4">Admin Moderation Panel</h2>

        {% if not session.get('is_admin') %}
        <form method="POST" class="mt-4">
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter Admin Password" required>
            <button type="submit" class="btn btn-danger w-100">Unlock Moderation Vault</button>
        </form>
        {% else %}
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>Author</th>
                        <th>Content</th>
                        <th>Toxicity Score</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for post in posts %}
                    <tr>
                        <td><span class="author-tag" style="font-size: 0.7rem;">{{ post.author }}</span></td>
                        <td>{{ post.content }}</td>
                        <td>
                            <!-- Color coding the score -->
                            <span class="badge {% if post.toxicity_score >= 7 %}bg-danger{% elif post.toxicity_score >= 4 %}bg-warning text-dark{% else %}bg-success{% endif %}">
                                {{ post.toxicity_score }} / 10
                            </span>
                        </td>
                        <td>
                            <a href="/delete/{{ post.id }}" class="btn btn-sm btn-outline-danger">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
