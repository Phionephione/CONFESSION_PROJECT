{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 animate__animated animate__fadeInLeft">Your Whispers</h2>
<div class="row">
    {% if not posts %}
    <p>You haven't whispered anything yet.</p>
    {% endif %}
    {% for post in posts %}
    <div class="col-md-6 mb-3">
        <div class="glass-card reveal">
            <p>{{ post.content }}</p>
            <div class="mt-3">
                <a href="/delete/{{ post.id }}" class="btn btn-sm btn-outline-danger">Delete This</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
