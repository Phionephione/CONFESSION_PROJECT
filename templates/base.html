<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: This line makes the site mobile-friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidspeak - Say it. Leave it. Let it disappear.</title>
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-light">
    <!-- IMPROVED MOBILE NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary py-3">
        <div class="container">
            <a class="navbar-brand fw-bold animate__animated animate__fadeIn" href="/">VOIDSPEAK</a>
            
            <!-- Mobile Menu Toggle Button (Hamburger) -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link mx-2" href="/about">How it Works</a></li>
                    <li class="nav-item"><a class="nav-link mx-2 text-info fw-bold" href="/whisper">+ Whisper</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="/wall">The Wall</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="/my-secrets">My Secrets</a></li>
                    <li class="nav-item"><a class="nav-link mx-2 text-danger" href="/admin">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4 mb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} animate__animated animate__shakeX shadow border-0">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>

    <!-- REQUIRED FOR MOBILE TOGGLE TO WORK -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
