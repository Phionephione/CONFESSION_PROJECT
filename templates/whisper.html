{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="glass-card animate__animated animate__zoomIn">
            <h2 class="mb-4">Whisper to the <span style="color: var(--accent);">Void</span></h2>
            <p class="text-secondary mb-4">You are posting as: <strong>{{ session['username'] }}</strong></p>
            
            <form action="/whisper" method="POST">
                <textarea 
                    name="confession" 
                    class="form-control mb-4" 
                    rows="8" 
                    placeholder="Unburden your soul here..." 
                    required>{{ last_text if last_text }}</textarea>
                
                <div class="d-flex justify-content-between">
                    <a href="/wall" class="btn btn-outline-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">Send Whisper</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
